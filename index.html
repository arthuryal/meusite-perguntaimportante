<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta MUITO importante 😏</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  h1 {
    color: white;
    font-size: 2em;
  }

  button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 10px;
    transition: 0.2s;
  }

  #sim {
    background-color: #00c853;
    color: white;
    position: absolute;
  }

  #nao {
    background-color: #d50000;
    color: white;
  }

  .final {
    display: none;
    font-size: 2em;
    color: white;
    animation: aparecer 1s ease forwards;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<body>

<div class="container" id="main">
  <h1>Você me ama, emm? 👻💘</h1>
  <button id="sim">Sim</button>
  <button id="nao">Não</button>
</div>

<div class="final" id="final">
  💖 EU SABIAAAAA 😍💖 <br>
  Agora você é oficialmente minha 😏🔥
</div>

<script>
  const sim = document.getElementById("sim");
  const nao = document.getElementById("nao");
  const final = document.getElementById("final");
  const main = document.getElementById("main");

  // posição inicial
  sim.style.left = "40%";
  sim.style.top = "60%";

  function moverBotao() {
    const largura = window.innerWidth - 100;
    const altura = window.innerHeight - 100;

    const x = Math.random() * largura;
    const y = Math.random() * altura;

    sim.style.left = x + "px";
    sim.style.top = y + "px";
  }

  // foge no mouse
  sim.addEventListener("mouseover", moverBotao);

  // foge no toque (celular)
  sim.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moverBotao();
  });

  // se conseguir clicar
  sim.addEventListener("click", () => {
    main.style.display = "none";
    final.style.display = "block";
    criarCoracoes();
  });

  // botão não zoeiro
  nao.addEventListener("click", () => {
    nao.innerText = "Tem certeza? 😳";
    document.body.style.background = "linear-gradient(135deg, #ff4d4d, #000)";
  });

  function criarCoracoes() {
    for (let i = 0; i < 30; i++) {
      const coracao = document.createElement("div");
      coracao.innerHTML = "💖";
      coracao.style.position = "absolute";
      coracao.style.left = Math.random() * 100 + "vw";
      coracao.style.top = "-20px";
      coracao.style.fontSize = "24px";

      document.body.appendChild(coracao);

      setTimeout(() => {
        coracao.style.top = "100vh";
        coracao.style.transition = "2s linear";
      }, 50);
    }
  }
</script>

</body>
</html>
